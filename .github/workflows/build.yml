name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'          # Cache pip downloads between runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole `
            --name "Cube-Data-Changer-AIO-M" `
            --icon="icon.ico" `
            --add-data "logo.png;." `
            --add-data "icon.ico;." `
            --collect-all customtkinter `
            --collect-all openpyxl `
            --hidden-import=PIL._tkinter_finder `
            --hidden-import=numpy `
            --exclude-module=matplotlib `
            --exclude-module=scipy `
            --exclude-module=tkinter.test `
            --exclude-module=unittest `
            app.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          tag_name: ${{ github.ref_name }}
          name: "Cube Data Changer AIO Manual ${{ github.ref_name }}"
          body: |
            ## Cube Data Changer AIO Manual ${{ github.ref_name }}

            **All-in-One** tool with configurable cell mapping for any office Excel format.

            ### What's New
            - Large file support (1000+ sheets without freezing)
            - Enforced weight gaps (≥0.040 kg concrete, ≥0.005 kg mortar)
            - Enforced strength gaps (≥10.0 kN concrete, all unique mortar)
            - Cross-sheet derived average variation (÷225 ×10 integer differs each sheet)
            - Cancel button for aborting large jobs
            - Buffered log output for smooth UI

            ### Features
            - Auto-generate concrete (M10–M45) and mortar (1:4, 1:6) test data
            - Configurable cell mapping via ⚙ Cell Configuration dialog
            - Calendar date processing (7-day / 28-day)
            - Modern dark mode UI

            ### Download
            Download the `.exe` file below — no Python required.
          draft: false
          prerelease: false
